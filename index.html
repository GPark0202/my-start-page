<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새 탭</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary:#202124;--bg-secondary:#303134;--bg-tertiary:#3c4043;--bg-hover:#404347;
    --text-primary:#e8eaed;--text-secondary:#9aa0a6;--text-muted:#6e7479;
    --accent:#8ab4f8;--accent-hover:#aecbfa;--accent-dim:rgba(138,180,248,0.12);
    --danger:#f28b82;--danger-dim:rgba(242,139,130,0.12);
    --success:#81c995;--success-dim:rgba(129,201,149,0.15);
    --warning:#fdd663;--warning-dim:rgba(253,214,99,0.15);
    --border:#5f6368;--shadow:rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-primary);color:var(--text-primary);font-family:'Outfit','Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-y:auto;}

  /* Auth (placeholder — populated in Phase C with Google Identity Services) */
  .auth-bar{position:fixed;top:12px;right:16px;z-index:50;display:flex;align-items:center;gap:10px;}
  .auth-bar .user-name{font-size:12px;color:var(--text-secondary);}
  .auth-bar .user-avatar{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid var(--bg-tertiary);}
  .btn-auth{padding:6px 16px;background:var(--accent);color:#202124;border:none;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;}
  .btn-auth:hover{background:var(--accent-hover);}
  .btn-auth.logout{background:var(--bg-tertiary);color:var(--text-secondary);font-weight:400;}
  .btn-auth.logout:hover{background:var(--bg-hover);}
  .sync-badge{font-size:11px;color:var(--success);display:flex;align-items:center;gap:4px;}
  .sync-badge::before{content:'';width:6px;height:6px;background:var(--success);border-radius:50%;display:inline-block;}

  /* Bookmark */
  .bookmark-bar{margin-top:48px;margin-bottom:40px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:0 16px;}
  .bm-pill{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:var(--bg-secondary);border:1px solid var(--bg-tertiary);border-radius:20px;text-decoration:none;color:var(--text-secondary);font-size:13px;font-family:inherit;transition:all .15s;white-space:nowrap;}
  .bm-pill:hover{background:var(--bg-tertiary);color:var(--text-primary);border-color:var(--border);box-shadow:0 1px 4px var(--shadow);}
  .bm-emoji{font-size:15px;line-height:1;}

  /* Search */
  .search-container{margin-top:0;margin-bottom:36px;width:100%;max-width:584px;position:relative;}
  .search-logo{text-align:center;margin-bottom:28px;font-size:64px;font-weight:700;letter-spacing:-2px;background:linear-gradient(135deg,#4285f4 0%,#ea4335 25%,#fbbc05 50%,#34a853 75%,#4285f4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .search-bar{width:100%;height:48px;background:var(--bg-secondary);border:1px solid var(--bg-tertiary);border-radius:24px;display:flex;align-items:center;padding:0 18px;transition:all .2s ease;cursor:text;}
  .search-bar:hover,.search-bar:focus-within{background:var(--bg-tertiary);border-color:var(--border);box-shadow:0 2px 8px var(--shadow);}
  .search-icon{color:var(--text-secondary);margin-right:12px;flex-shrink:0;}
  .search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:16px;font-family:inherit;}
  .search-bar input::placeholder{color:var(--text-secondary);}

  /* Shortcuts */
  .shortcuts-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;max-width:680px;margin-bottom:44px;padding:0 16px;}
  .shortcut{display:flex;flex-direction:column;align-items:center;width:96px;text-decoration:none;cursor:pointer;border-radius:var(--radius);padding:12px 4px;transition:background .15s;}
  .shortcut:hover{background:var(--bg-secondary);}
  .shortcut-icon{width:48px;height:48px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;}
  .shortcut-icon img{width:24px;height:24px;border-radius:2px;}
  .shortcut-label{font-size:12px;color:var(--text-secondary);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;}

  /* Modal (reserved for Phase C — Brain Dump, Time Plan blocks) */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--bg-secondary);border-radius:var(--radius);padding:24px;width:420px;max-width:90vw;box-shadow:0 8px 32px var(--shadow);}
  .modal h3{font-size:16px;margin-bottom:16px;}
  .modal label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
  .modal input,.modal select{width:100%;height:38px;background:var(--bg-primary);border:1px solid var(--bg-tertiary);border-radius:var(--radius-sm);padding:0 12px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .2s;}
  .modal input:focus,.modal select:focus{border-color:var(--accent);}
  .modal select option{background:var(--bg-primary);color:var(--text-primary);}
  .modal-row{display:flex;gap:12px;}
  .modal-row>div{flex:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}
  .modal-actions button{padding:8px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;}
  .btn-cancel{background:var(--bg-tertiary);color:var(--text-primary);}.btn-cancel:hover{background:var(--bg-hover);}
  .btn-save{background:var(--accent);color:#202124;font-weight:600;}.btn-save:hover{background:var(--accent-hover);}
</style>
</head>
<body>
<div class="auth-bar" id="authBar"></div>

<div class="bookmark-bar" id="bookmarkBar"></div>

<div class="search-container">
  <div class="search-logo">Google</div>
  <div class="search-bar" onclick="this.querySelector('input').focus()">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Google 검색 또는 URL 입력" autocomplete="off">
  </div>
</div>

<div class="shortcuts-grid" id="shortcutsGrid"></div>

<script>
// ── State (static data loaded from git-committed JSON) ──
let shortcuts=[], bookmarks=[];

// ── Static data loaders ──
async function fetchShortcuts(){
  try{const r=await fetch('./data/shortcuts.json',{cache:'no-cache'});shortcuts=await r.json();}
  catch(e){console.error('shortcuts.json 로드 실패',e);shortcuts=[];}
}
async function fetchBookmarks(){
  try{const r=await fetch('./data/bookmarks.json',{cache:'no-cache'});bookmarks=await r.json();}
  catch(e){console.error('bookmarks.json 로드 실패',e);bookmarks=[];}
}

// ── Search ──
document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const q=e.target.value.trim();if(!q)return;
  if(/^https?:\/\//i.test(q)||/^[a-z0-9-]+\.[a-z]{2,}/i.test(q)){window.location.href=q.startsWith('http')?q:'https://'+q;}
  else{window.location.href='https://www.google.com/search?q='+encodeURIComponent(q);}}
});

// ── Calendar Icon (for __CAL__ sentinel) ──
function calIcon(){
  const c=document.createElement('canvas');c.width=64;c.height=64;const x=c.getContext('2d'),d=new Date().getDate().toString();
  x.fillStyle='#fff';x.beginPath();x.roundRect(4,4,56,56,8);x.fill();
  x.fillStyle='#4285f4';x.beginPath();x.roundRect(4,4,56,15,[8,8,0,0]);x.fill();
  x.strokeStyle='#5f6368';x.lineWidth=3.5;x.lineCap='round';x.beginPath();x.moveTo(22,2);x.lineTo(22,12);x.moveTo(42,2);x.lineTo(42,12);x.stroke();
  x.fillStyle='#3c4043';x.font='bold 28px "Outfit",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(d,32,40);
  return c.toDataURL();
}

// ── Bookmark rendering ──
function renderBookmarks(){
  const b=document.getElementById('bookmarkBar');
  b.innerHTML=bookmarks.map(bm=>`<a class="bm-pill" href="${bm.url}"><span class="bm-emoji">${bm.emoji}</span>${escapeHtml(bm.name)}</a>`).join('');
}

// ── Shortcut rendering ──
function renderShortcuts(){
  const g=document.getElementById('shortcutsGrid');g.innerHTML='';
  shortcuts.forEach(s=>{const a=document.createElement('a');a.className='shortcut';a.href=s.url;
    const ic=s.icon==='__CAL__'?calIcon():s.icon;
    a.innerHTML=`<div class="shortcut-icon"><img src="${ic}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22><text y=%2218%22 font-size=%2216%22>${s.name[0]}</text></svg>'"></div><span class="shortcut-label">${escapeHtml(s.name)}</span>`;
    g.appendChild(a);});
}

// ── Helpers (preserved for Phase C) ──
function getKSTDateString(){const n=new Date();return new Date(n.getTime()+(9*3600000)).toISOString().slice(0,10);}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ── Init ──
(async()=>{
  await Promise.all([fetchShortcuts(),fetchBookmarks()]);
  renderBookmarks();renderShortcuts();
})();
</script>
</body>
</html>

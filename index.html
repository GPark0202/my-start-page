<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새 탭</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary:#202124;--bg-secondary:#303134;--bg-tertiary:#3c4043;--bg-hover:#404347;
    --text-primary:#e8eaed;--text-secondary:#9aa0a6;--text-muted:#6e7479;
    --accent:#8ab4f8;--accent-hover:#aecbfa;--accent-dim:rgba(138,180,248,0.12);
    --danger:#f28b82;--danger-dim:rgba(242,139,130,0.12);
    --success:#81c995;--success-dim:rgba(129,201,149,0.15);
    --warning:#fdd663;--warning-dim:rgba(253,214,99,0.15);
    --border:#5f6368;--shadow:rgba(0,0,0,0.4);--radius:12px;--radius-sm:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-primary);color:var(--text-primary);font-family:'Outfit','Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-y:auto;}

  /* Auth */
  .auth-bar{position:fixed;top:12px;right:16px;z-index:50;display:flex;align-items:center;gap:10px;}
  .auth-bar .user-name{font-size:12px;color:var(--text-secondary);}
  .auth-bar .user-avatar{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid var(--bg-tertiary);}
  .btn-auth{padding:6px 16px;background:var(--accent);color:#202124;border:none;border-radius:20px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;}
  .btn-auth:hover{background:var(--accent-hover);}
  .btn-auth.logout{background:var(--bg-tertiary);color:var(--text-secondary);font-weight:400;}
  .btn-auth.logout:hover{background:var(--bg-hover);}
  .sync-badge{font-size:11px;color:var(--success);display:flex;align-items:center;gap:4px;}
  .sync-badge::before{content:'';width:6px;height:6px;background:var(--success);border-radius:50%;display:inline-block;}

  /* Bookmark */
  .bookmark-bar{margin-top:48px;margin-bottom:40px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:0 16px;}
  .bm-pill{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:var(--bg-secondary);border:1px solid var(--bg-tertiary);border-radius:20px;text-decoration:none;color:var(--text-secondary);font-size:13px;font-family:inherit;transition:all .15s;white-space:nowrap;}
  .bm-pill:hover{background:var(--bg-tertiary);color:var(--text-primary);border-color:var(--border);box-shadow:0 1px 4px var(--shadow);}
  .bm-emoji{font-size:15px;line-height:1;}

  /* Search */
  .search-container{margin-top:0;margin-bottom:36px;width:100%;max-width:584px;position:relative;}
  .search-logo{text-align:center;margin-bottom:28px;font-size:64px;font-weight:700;letter-spacing:-2px;background:linear-gradient(135deg,#4285f4 0%,#ea4335 25%,#fbbc05 50%,#34a853 75%,#4285f4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .search-bar{width:100%;height:48px;background:var(--bg-secondary);border:1px solid var(--bg-tertiary);border-radius:24px;display:flex;align-items:center;padding:0 18px;transition:all .2s ease;cursor:text;}
  .search-bar:hover,.search-bar:focus-within{background:var(--bg-tertiary);border-color:var(--border);box-shadow:0 2px 8px var(--shadow);}
  .search-icon{color:var(--text-secondary);margin-right:12px;flex-shrink:0;}
  .search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-size:16px;font-family:inherit;}
  .search-bar input::placeholder{color:var(--text-secondary);}

  /* Shortcuts */
  .shortcuts-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;max-width:680px;margin-bottom:44px;padding:0 16px;}
  .shortcut{display:flex;flex-direction:column;align-items:center;width:96px;text-decoration:none;cursor:pointer;border-radius:var(--radius);padding:12px 4px;transition:background .15s;}
  .shortcut:hover{background:var(--bg-secondary);}
  .shortcut-icon{width:48px;height:48px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;}
  .shortcut-icon img{width:24px;height:24px;border-radius:2px;}
  .shortcut-label{font-size:12px;color:var(--text-secondary);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;}

  /* Modal (shared) */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--bg-secondary);border-radius:var(--radius);padding:24px;width:420px;max-width:90vw;box-shadow:0 8px 32px var(--shadow);}
  .modal h3{font-size:16px;margin-bottom:16px;}
  .modal label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
  .modal input,.modal select{width:100%;height:38px;background:var(--bg-primary);border:1px solid var(--bg-tertiary);border-radius:var(--radius-sm);padding:0 12px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .2s;}
  .modal input:focus,.modal select:focus{border-color:var(--accent);}
  .modal select option{background:var(--bg-primary);color:var(--text-primary);}
  .modal-row{display:flex;gap:12px;}
  .modal-row>div{flex:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}
  .modal-actions button{padding:8px 20px;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;}
  .btn-cancel{background:var(--bg-tertiary);color:var(--text-primary);}.btn-cancel:hover{background:var(--bg-hover);}
  .btn-save{background:var(--accent);color:#202124;font-weight:600;}.btn-save:hover{background:var(--accent-hover);}
  .btn-danger{background:var(--danger-dim);color:var(--danger);}.btn-danger:hover{background:var(--danger);color:#202124;}

  /* Planner layout */
  .planner{display:flex;gap:16px;width:100%;max-width:1100px;padding:0 16px;margin-bottom:60px;align-items:flex-start;}
  .planner-left{display:flex;flex-direction:column;gap:12px;width:320px;flex-shrink:0;}
  .planner-right{flex:1;min-width:0;}
  .panel{background:var(--bg-secondary);border-radius:var(--radius);padding:16px;}
  .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .panel-title{font-size:14px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:6px;}
  .panel-sub{font-size:10px;color:var(--text-muted);font-weight:400;}
  .panel-add{padding:4px 10px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(138,180,248,0.25);border-radius:14px;font-size:11px;font-family:inherit;cursor:pointer;transition:all .15s;}
  .panel-add:hover{background:var(--accent);color:#202124;border-color:var(--accent);}

  /* Daily Job */
  .dj-input-row{display:flex;gap:6px;margin-bottom:10px;}
  .dj-input{flex:1;height:32px;background:var(--bg-primary);border:1px solid var(--bg-tertiary);border-radius:var(--radius-sm);padding:0 10px;color:var(--text-primary);font-size:12px;font-family:inherit;outline:none;}
  .dj-input:focus{border-color:var(--accent);}
  .dj-add{padding:0 12px;background:var(--accent);color:#202124;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;}
  .dj-add:hover{background:var(--accent-hover);}
  .dj-list{display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-tertiary) transparent;}
  .dj-list::-webkit-scrollbar{width:5px;}.dj-list::-webkit-scrollbar-thumb{background:var(--bg-tertiary);border-radius:4px;}
  .dj-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg-primary);border-radius:var(--radius-sm);cursor:grab;}
  .dj-item:hover{background:var(--bg-tertiary);}
  .dj-item.done{opacity:.5;}
  .dj-item.done .dj-text{text-decoration:line-through;color:var(--text-muted);}
  .dj-check{width:16px;height:16px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .dj-item.done .dj-check{background:var(--success-dim);border-color:var(--success);}
  .dj-check svg{display:none;color:var(--success);}
  .dj-item.done .dj-check svg{display:block;}
  .dj-text{flex:1;font-size:13px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dj-del{width:20px;height:20px;border:none;background:none;color:var(--text-muted);cursor:pointer;opacity:0;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .dj-item:hover .dj-del{opacity:1;}
  .dj-del:hover{background:var(--danger-dim);color:var(--danger);}
  .empty-msg{text-align:center;padding:14px;color:var(--text-muted);font-size:12px;}

  /* Brain Dump */
  .brain-list{display:flex;flex-direction:column;gap:6px;max-height:480px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg-tertiary) transparent;}
  .brain-list::-webkit-scrollbar{width:5px;}.brain-list::-webkit-scrollbar-thumb{background:var(--bg-tertiary);border-radius:4px;}
  .brain-item{display:flex;flex-direction:column;gap:3px;padding:8px 10px;background:var(--bg-primary);border-radius:var(--radius-sm);border-left:3px solid var(--text-muted);cursor:grab;}
  .brain-item:hover{background:var(--bg-tertiary);}
  .brain-row{display:flex;align-items:center;gap:6px;}
  .brain-cat{font-size:9px;padding:2px 7px;border-radius:10px;color:#202124;font-weight:700;flex-shrink:0;}
  .brain-name{flex:1;font-size:13px;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .brain-meta{font-size:10px;color:var(--text-muted);}

  /* Time Plan */
  .tp-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:0 4px;}
  .tp-nav{width:32px;height:32px;background:var(--bg-secondary);border:none;border-radius:50%;color:var(--text-secondary);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1;}
  .tp-nav:hover{background:var(--bg-tertiary);color:var(--text-primary);}
  .tp-date-wrap{flex:1;display:flex;align-items:center;gap:6px;}
  .tp-date-wrap input[type=date]{background:none;border:none;color:var(--text-primary);font:600 15px 'Outfit','Noto Sans KR',sans-serif;outline:none;cursor:pointer;color-scheme:dark;}
  .tp-dow{font-size:13px;color:var(--text-muted);}
  .tp-today{padding:6px 14px;background:var(--bg-secondary);border:1px solid var(--bg-tertiary);border-radius:var(--radius-sm);color:var(--text-secondary);font-size:12px;font-family:inherit;cursor:pointer;}
  .tp-today:hover{background:var(--bg-tertiary);color:var(--text-primary);}

  .time-grid{position:relative;background:var(--bg-secondary);border-radius:var(--radius);padding:12px 12px 24px 50px;}
  .time-grid-inner{position:relative;}
  .time-row{position:relative;height:30px;border-top:1px dashed rgba(95,99,104,0.3);}
  .time-row.hour{border-top:1px solid var(--border);}
  .time-row:first-child{border-top:1px solid var(--border);}
  .time-label{position:absolute;left:-44px;top:-7px;font-size:10px;color:var(--text-muted);width:40px;text-align:right;font-family:'Outfit',monospace;}
  .time-row.drop-over{background:var(--accent-dim);}
  .time-end-label{position:absolute;left:-44px;font-size:10px;color:var(--text-muted);width:40px;text-align:right;font-family:'Outfit',monospace;}

  .block{position:absolute;left:6px;right:6px;padding:6px 10px;border-radius:var(--radius-sm);border-left:3px solid var(--text-muted);background:var(--bg-tertiary);cursor:grab;overflow:hidden;z-index:1;box-shadow:0 2px 6px var(--shadow);user-select:none;}
  .block:hover{filter:brightness(1.15);z-index:2;}
  .block.dragging{opacity:.4;}
  .block-row{display:flex;align-items:flex-start;gap:8px;height:100%;}
  .block-text{flex:1;min-width:0;font-size:12px;color:var(--text-primary);line-height:1.3;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;font-weight:500;}
  .block-time{flex-shrink:0;font-size:10px;color:var(--text-secondary);}
  .block-handle{position:absolute;left:0;right:0;height:6px;cursor:ns-resize;background:transparent;z-index:3;}
  .block-handle.top{top:-3px;}
  .block-handle.bot{bottom:-3px;}
</style>
</head>
<body ondragend="onGlobalDragEnd()">
<div class="auth-bar" id="authBar"></div>
<div class="bookmark-bar" id="bookmarkBar"></div>

<div class="search-container">

  <div class="search-bar" onclick="this.querySelector('input').focus()">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Google 검색 또는 URL 입력" autocomplete="off">
  </div>
</div>

<div class="shortcuts-grid" id="shortcutsGrid"></div>

<div class="planner">
  <div class="planner-left">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Daily Job<span class="panel-sub">06:00 KST 리셋</span></div>

      <div class="dj-input-row">
        <input type="text" class="dj-input" id="djInput" placeholder="오늘의 할 일..." autocomplete="off">

      <div class="dj-list" id="djList"></div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Brain Dump<span class="panel-sub">누적</span></div>

      <div class="time-grid-inner" id="tpGrid"></div>

  </div>
</div>

<!-- Brain Dump add/edit modal -->
<div class="modal-overlay" id="bdModal" onclick="if(event.target===this)bdClose()">
  <div class="modal">
    <h3 id="bdModalTitle">새 업무 추가</h3>

    <select id="bdCategory">
      <option value="피치">피치</option>
      <option value="BCI">BCI</option>
      <option value="타이탄">타이탄</option>
      <option value="오로라">오로라</option>
      <option value="개인플젝">개인플젝</option>
      <option value="기타" selected>기타</option>
    </select>
    <div id="bdCreatedAt" style="font-size:11px;color:var(--text-muted);margin-bottom:14px;"></div>
    <div class="modal-actions">
      <button class="btn-danger" id="bdDeleteBtn" style="display:none;" onclick="bdDelete()">삭제</button>
      <button class="btn-cancel" onclick="bdClose()">취소</button>
      <button class="btn-save" onclick="bdSave()">저장</button>
    </div>

</div>

<!-- Time Plan block edit modal -->
<div class="modal-overlay" id="blockModal" onclick="if(event.target===this)blockClose()">
  <div class="modal">
    <h3>블록 편집</h3>
    <label>제목</label>
    <input type="text" id="blockText" autocomplete="off">

      <div>

      <option value="피치">피치</option>
      <option value="BCI">BCI</option>
      <option value="타이탄">타이탄</option>
      <option value="오로라">오로라</option>
      <option value="개인플젝">개인플젝</option>
      <option value="기타">기타</option>
    </select>
    <div class="modal-actions">
      <button class="btn-danger" onclick="blockDelete()">삭제</button>
      <button class="btn-cancel" onclick="blockClose()">취소</button>
      <button class="btn-save" onclick="blockSave()">저장</button>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async defer></script>
<script>
// ── Config ──
const CLIENT_ID='676989045728-c3bavcs39ppmvvekb92lbnmssrs66bkj.apps.googleusercontent.com';
const SCOPES='openid email profile https://www.googleapis.com/auth/drive.appdata';
const CAT_COLOR={'피치':'#f28b82','BCI':'#fdd663','타이탄':'#a8b8c4','오로라':'#81c995','개인플젝':'#8ab4f8','기타':'#9aa0a6'};
const SLOT_MIN=30, SLOT_PX=30, HOUR_START=6, HOUR_END=24;
const SLOT_COUNT=(HOUR_END-HOUR_START)*60/SLOT_MIN;   // 36

// ── State ──
let shortcuts=[], bookmarks=[];
let dailyJob={items:[],lastResetDate:''};
let brainDump=[];
let timeplanByDate={};   // { 'YYYY-MM-DD': [blocks] }
let currentDate=getPlannerDate();
let userProfile=null, editingBrainId=null, editingBlockId=null, dragData=null;

// ── Auth (Google Identity Services) ──
let tokenClient=null, accessToken=null, tokenExpiry=0;
function isTokenValid(){return !!accessToken && Date.now()<tokenExpiry-60000;}

async function onGsiLoad(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES, prompt:'',
    callback:onTokenResponse
  });
  const t=localStorage.getItem('drive_token'),
        e=parseInt(localStorage.getItem('drive_token_expiry')||'0'),
        p=localStorage.getItem('drive_user');
  if(p){try{userProfile=JSON.parse(p);}catch(_){}}
  if(t && Date.now()<e-60000){
    accessToken=t; tokenExpiry=e;
    renderAuth(); loadAllFromDrive();
  }else if(p){
    renderAuth();
    if(await refreshToken()){renderAuth(); loadAllFromDrive();}
  }else{
    renderAuth();
  }
}

function onTokenResponse(r){
  if(r && r.access_token){
    accessToken=r.access_token;
    tokenExpiry=Date.now()+(r.expires_in||3600)*1000;
    localStorage.setItem('drive_token',accessToken);
    localStorage.setItem('drive_token_expiry',tokenExpiry+'');
    fetchUserProfile().then(()=>{renderAuth(); loadAllFromDrive();});
  }else{
    console.error('token response failed',r);
    alert('Google 로그인 실패');
  }
}

async function fetchUserProfile(){
  try{
    const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
    if(!r.ok)return;
    const d=await r.json();
    userProfile={email:d.email,name:d.name,picture:d.picture};
    localStorage.setItem('drive_user',JSON.stringify(userProfile));
  }catch(e){console.error('userinfo failed',e);}
}

function doLogin(){
  if(!tokenClient){alert('Google 라이브러리 로딩 중. 잠시 후 다시 시도하세요.');return;}
  tokenClient.requestAccessToken({prompt:'consent'});
}

function doLogout(){
  if(accessToken)try{google.accounts.oauth2.revoke(accessToken,()=>{});}catch(_){}
  accessToken=null; tokenExpiry=0; userProfile=null;
  localStorage.removeItem('drive_token');
  localStorage.removeItem('drive_token_expiry');
  localStorage.removeItem('drive_user');
  renderAuth();
}

function renderAuth(){
  const bar=document.getElementById('authBar');
  if(isTokenValid()){
    const p=userProfile||{};
    bar.innerHTML=`<span class="sync-badge">Drive 연결</span>`
      +(p.name||p.email?`<span class="user-name">${escapeHtml(p.name||p.email)}</span>`:'')
      +(p.picture?`<img class="user-avatar" src="${p.picture}" title="로그아웃" onclick="doLogout()">`:'')
      +`<button class="btn-auth logout" onclick="doLogout()">로그아웃</button>`;
  }else{
    bar.innerHTML='<button class="btn-auth" onclick="doLogin()">Google 로그인</button>';
  }
}

// ── Drive API wrapper (appDataFolder) ──
const DRIVE_API='https://www.googleapis.com/drive/v3';
const DRIVE_UPLOAD='https://www.googleapis.com/upload/drive/v3';

async function driveFind(name){
  const q=`name='${name}' and 'appDataFolder' in parents and trashed=false`;
  const r=await driveFetchJson(`${DRIVE_API}/files?spaces=appDataFolder&q=${encodeURIComponent(q)}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc`);
  if(!r||!r.files||!r.files.length)return null;
  return r.files[0];
}

async function driveLoad(fileId){
  return driveFetchJson(`${DRIVE_API}/files/${fileId}?alt=media`);
}

async function driveCreate(name,content){
  const metadata={name,parents:['appDataFolder']};
  const boundary='-----'+Math.random().toString(36).slice(2);
  const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(content)}\r\n--${boundary}--`;
  return driveFetchJson(`${DRIVE_UPLOAD}/files?uploadType=multipart&fields=id`,{
    method:'POST',
    headers:{'Content-Type':`multipart/related; boundary=${boundary}`},
    body
  });
}

async function driveUpdate(fileId,content){
  return driveFetchJson(`${DRIVE_UPLOAD}/files/${fileId}?uploadType=media`,{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(content)
  });
}

async function driveSave(name,content){
  if(!isTokenValid())return;
  try{
    const existing=await driveFind(name);
    if(existing)await driveUpdate(existing.id,content);
    else await driveCreate(name,content);
  }catch(e){console.error('drive save failed',name,e);}
}

async function driveFetchJson(url,opts={}){
  if(!isTokenValid())return null;
  opts.headers=Object.assign({Authorization:'Bearer '+accessToken},opts.headers||{});
  let r;
  try{r=await fetch(url,opts);}catch(e){console.error('drive fetch network error',e);return null;}
  if(r.status===401){
    // try silent refresh once
    const ok=await refreshToken();
    if(!ok)return null;
    opts.headers.Authorization='Bearer '+accessToken;
    try{r=await fetch(url,opts);}catch(e){return null;}
  }
  if(!r.ok){console.error('drive fetch failed',url,r.status);return null;}
  if(r.status===204)return null;
  return r.json();
}

function refreshToken(){
  return new Promise(res=>{
    if(!tokenClient){res(false);return;}
    const orig=tokenClient.callback;
    tokenClient.callback=(tr)=>{
      tokenClient.callback=orig;
      if(tr && tr.access_token){
        accessToken=tr.access_token;
        tokenExpiry=Date.now()+(tr.expires_in||3600)*1000;
        localStorage.setItem('drive_token',accessToken);
        localStorage.setItem('drive_token_expiry',tokenExpiry+'');
        res(true);
      }else res(false);
    };
    try{tokenClient.requestAccessToken({prompt:''});}catch(e){tokenClient.callback=orig;res(false);}
  });
}

// ── localStorage cache ──
function cacheGet(key){try{return JSON.parse(localStorage.getItem('hp:'+key));}catch(_){return null;}}
function cacheSet(key,val){try{localStorage.setItem('hp:'+key,JSON.stringify(val));}catch(_){}}

// ── Date helpers ──
function getPlannerDate(){
  // KST date, but rolls over at 06:00 instead of 00:00
  const n=new Date();
  const kst=new Date(n.getTime()+(9*3600000));
  if(kst.getUTCHours()<6)kst.setUTCDate(kst.getUTCDate()-1);
  return kst.toISOString().slice(0,10);
}
function addDays(date,n){const d=new Date(date+'T00:00:00Z');d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function dowKor(date){return ['일','월','화','수','목','금','토'][new Date(date+'T00:00:00Z').getUTCDay()];}

// ── Helpers ──
function escapeHtml(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function pad2(n){return String(n).padStart(2,'0');}
function minToTime(m){return pad2(Math.floor(m/60))+':'+pad2(m%60);}
function timeToMin(hhmm){const [h,m]=hhmm.split(':').map(Number);return h*60+m;}

// ── Search ──
document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const q=e.target.value.trim();if(!q)return;
  if(/^https?:\/\//i.test(q)||/^[a-z0-9-]+\.[a-z]{2,}/i.test(q)){window.location.href=q.startsWith('http')?q:'https://'+q;}
  else{window.location.href='https://www.google.com/search?q='+encodeURIComponent(q);}}
});

// ── Calendar Icon (for __CAL__ sentinel) ──
function calIcon(){
  const c=document.createElement('canvas');c.width=64;c.height=64;const x=c.getContext('2d'),d=new Date().getDate().toString();
  x.fillStyle='#fff';x.beginPath();x.roundRect(4,4,56,56,8);x.fill();
  x.fillStyle='#4285f4';x.beginPath();x.roundRect(4,4,56,15,[8,8,0,0]);x.fill();
  x.strokeStyle='#5f6368';x.lineWidth=3.5;x.lineCap='round';x.beginPath();x.moveTo(22,2);x.lineTo(22,12);x.moveTo(42,2);x.lineTo(42,12);x.stroke();
  x.fillStyle='#3c4043';x.font='bold 28px "Outfit",sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(d,32,40);
  return c.toDataURL();
}

// ── Drive sync (debounced) ──
const saveQueue={};
function scheduleSave(name,getContent){
  if(saveQueue[name])clearTimeout(saveQueue[name]);
  saveQueue[name]=setTimeout(()=>{driveSave(name,getContent());delete saveQueue[name];},300);
}

async function loadAllFromDrive(){
  // cache→paint already happened in init; this fetches latest from Drive
  await Promise.all([loadDailyJob(),loadBrainDump(),loadTimeplan(currentDate)]);
  checkDailyJobReset();
  renderAll();
}

async function loadDailyJob(){
  const f=await driveFind('dailyJob.json');
  if(!f)return;
  const d=await driveLoad(f.id);
  if(d && typeof d==='object'){dailyJob=d;cacheSet('dailyJob',d);}
}

async function loadBrainDump(){
  const f=await driveFind('brainDump.json');
  if(!f)return;
  const d=await driveLoad(f.id);
  if(Array.isArray(d)){brainDump=d;cacheSet('brainDump',d);}
}

async function loadTimeplan(date){
  if(!isTokenValid())return;
  const f=await driveFind('timeplan-'+date+'.json');
  if(!f){if(!timeplanByDate[date])timeplanByDate[date]=[];return;}
  const d=await driveLoad(f.id);
  if(Array.isArray(d)){timeplanByDate[date]=d;cacheSet('tp:'+date,d);}
}

function saveDailyJob(){cacheSet('dailyJob',dailyJob);scheduleSave('dailyJob.json',()=>dailyJob);}
function saveBrainDump(){cacheSet('brainDump',brainDump);scheduleSave('brainDump.json',()=>brainDump);}
function saveTimeplan(date){const d=timeplanByDate[date]||[];cacheSet('tp:'+date,d);scheduleSave('timeplan-'+date+'.json',()=>d);}

// ── Daily Job ──
function checkDailyJobReset(){
  const pd=getPlannerDate();
  if(dailyJob.lastResetDate!==pd){
    dailyJob={items:[],lastResetDate:pd};
    saveDailyJob();
  }
}

function djAdd(){
  const inp=document.getElementById('djInput'),t=inp.value.trim();if(!t)return;
  dailyJob.items.push({id:uid(),text:t,done:false});
  if(!dailyJob.lastResetDate)dailyJob.lastResetDate=getPlannerDate();
  inp.value='';saveDailyJob();renderDailyJob();
}
function djToggle(id){const it=dailyJob.items.find(i=>i.id===id);if(it){it.done=!it.done;saveDailyJob();renderDailyJob();}}
function djDelete(id){dailyJob.items=dailyJob.items.filter(i=>i.id!==id);saveDailyJob();renderDailyJob();}

function renderDailyJob(){
  const l=document.getElementById('djList');
  if(!dailyJob.items.length){l.innerHTML='<div class="empty-msg">오늘 할 일을 추가하세요</div>';return;}
  l.innerHTML=dailyJob.items.map(it=>`<div class="dj-item ${it.done?'done':''}" draggable="true" ondragstart="onDragStart(event,'dj','${it.id}')">

    <span class="dj-text">${escapeHtml(it.text)}</span>
    <button class="dj-del" onclick="djDelete('${it.id}')" title="삭제"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>`).join('');

document.getElementById('djInput').addEventListener('keydown',e=>{if(e.key==='Enter')djAdd();});

// ── Time Plan ──
function tpPrev(){currentDate=addDays(currentDate,-1);onDateChange();}
function tpNext(){currentDate=addDays(currentDate,1);onDateChange();}
function tpToday(){currentDate=getPlannerDate();onDateChange();}
function tpSetDate(v){if(v){currentDate=v;onDateChange();}}

async function onDateChange(){
  document.getElementById('tpDate').value=currentDate;
  // restore from cache for instant paint
  const c=cacheGet('tp:'+currentDate);
  timeplanByDate[currentDate]=c||[];
  renderTimePlan();
  // then sync from Drive
  await loadTimeplan(currentDate);
  renderTimePlan();
}

function renderTimePlan(){
  const grid=document.getElementById('tpGrid');
  document.getElementById('tpDate').value=currentDate;
  document.getElementById('tpDow').textContent='('+dowKor(currentDate)+')';

  let rowsHtml='';
  for(let i=0;i<SLOT_COUNT;i++){
    const time=minToTime(HOUR_START*60+i*SLOT_MIN);
    const isHour=time.endsWith(':00');
    rowsHtml+=`<div class="time-row ${isHour?'hour':''}" data-slot="${i}" ondragover="onSlotDragOver(event)" ondragleave="onSlotDragLeave(event)" ondrop="onSlotDrop(event,${i})">${isHour?`<span class="time-label">${time}</span>`:''}</div>`;
  }
  // closing 24:00 label
  rowsHtml+=`<span class="time-end-label" style="top:${SLOT_COUNT*SLOT_PX-7}px;">${HOUR_END===24?'24:00':minToTime(HOUR_END*60)}</span>`;

  const blocks=timeplanByDate[currentDate]||[];
  let blocksHtml='';
  blocks.forEach(b=>{
    const startMin=timeToMin(b.start), endMin=timeToMin(b.end);
    const top=((startMin-HOUR_START*60)/SLOT_MIN)*SLOT_PX;
    const height=Math.max(SLOT_PX-2,((endMin-startMin)/SLOT_MIN)*SLOT_PX-2);
    const color=CAT_COLOR[b.category]||CAT_COLOR['기타'];
    const bg=color+'33';
    blocksHtml+=`<div class="block" style="top:${top}px;height:${height}px;border-left-color:${color};background:${bg};" draggable="true" data-id="${b.id}" ondragstart="onBlockDragStart(event,'${b.id}')" onclick="blockOpenEdit('${b.id}')">
      <div class="block-handle top" onmousedown="onBlockResize(event,'${b.id}','top')"></div>
      <div class="block-row">
        <div class="block-text">${escapeHtml(b.text)}</div>
        <div class="block-time">${b.start} – ${b.end}</div>
      </div>
      <div class="block-handle bot" onmousedown="onBlockResize(event,'${b.id}','bot')"></div>
    </div>`;
  });

  grid.innerHTML=rowsHtml+blocksHtml;
  grid.style.height=(SLOT_COUNT*SLOT_PX)+'px';
}

// ── Drag handlers (HTML5 native drag) ──
function onDragStart(ev,type,id){
  dragData={type,id};
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain',id);
}
function onBlockDragStart(ev,id){
  dragData={type:'block',id};
  ev.dataTransfer.effectAllowed='move';
  ev.dataTransfer.setData('text/plain',id);
  ev.currentTarget.classList.add('dragging');
}
function onSlotDragOver(ev){
  if(!dragData)return;
  ev.preventDefault();
  ev.currentTarget.classList.add('drop-over');
}
function onSlotDragLeave(ev){ev.currentTarget.classList.remove('drop-over');}

function onSlotDrop(ev,slot){
  ev.preventDefault();
  ev.currentTarget.classList.remove('drop-over');
  if(!dragData){onGlobalDragEnd();return;}

  const blocks=timeplanByDate[currentDate]||(timeplanByDate[currentDate]=[]);
  const slotStartMin=HOUR_START*60+slot*SLOT_MIN;

  if(dragData.type==='bd'){
    const src=brainDump.find(b=>b.id===dragData.id);
    if(src){
      blocks.push({id:uid(),start:minToTime(slotStartMin),end:minToTime(Math.min(slotStartMin+2*SLOT_MIN,HOUR_END*60)),text:src.name,category:src.category,sourceType:'brainDump'});
      brainDump=brainDump.filter(b=>b.id!==dragData.id);
      saveBrainDump();renderBrainDump();
    }
  }else if(dragData.type==='dj'){
    const src=dailyJob.items.find(i=>i.id===dragData.id);
    if(src){
      blocks.push({id:uid(),start:minToTime(slotStartMin),end:minToTime(Math.min(slotStartMin+2*SLOT_MIN,HOUR_END*60)),text:src.text,category:'기타',sourceType:'dailyJob'});
      dailyJob.items=dailyJob.items.filter(i=>i.id!==dragData.id);
      saveDailyJob();renderDailyJob();
    }
  }else if(dragData.type==='block'){
    const blk=blocks.find(b=>b.id===dragData.id);
    if(blk){
      const dur=timeToMin(blk.end)-timeToMin(blk.start);
      const ns=Math.max(HOUR_START*60,Math.min(HOUR_END*60-dur,slotStartMin));
      blk.start=minToTime(ns);
      blk.end=minToTime(ns+dur);
    }
  }
  dragData=null;
  saveTimeplan(currentDate);renderTimePlan();
}

function onGlobalDragEnd(){
  document.querySelectorAll('.block.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.time-row.drop-over').forEach(el=>el.classList.remove('drop-over'));
  dragData=null;
}

// ── Block resize (mouse-based, snap to 30-min) ──
function onBlockResize(ev,id,which){
  ev.stopPropagation();
  ev.preventDefault();
  const blocks=timeplanByDate[currentDate]||[];
  const blk=blocks.find(b=>b.id===id);if(!blk)return;
  const startY=ev.clientY;
  const initStart=timeToMin(blk.start), initEnd=timeToMin(blk.end);
  function onMove(e){
    const dy=e.clientY-startY;
    const dSlot=Math.round(dy/SLOT_PX);
    const dMin=dSlot*SLOT_MIN;
    if(which==='top'){
      const ns=Math.max(HOUR_START*60,Math.min(initEnd-SLOT_MIN,initStart+dMin));
      blk.start=minToTime(ns);
    }else{
      const ne=Math.max(initStart+SLOT_MIN,Math.min(HOUR_END*60,initEnd+dMin));
      blk.end=minToTime(ne);
    }
    renderTimePlan();
  }
  function onUp(){
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    saveTimeplan(currentDate);
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

// ── Block edit modal ──
function blockOpenEdit(id){
  const blocks=timeplanByDate[currentDate]||[];
  const blk=blocks.find(b=>b.id===id);if(!blk)return;
  editingBlockId=id;
  document.getElementById('blockText').value=blk.text;
  document.getElementById('blockStart').value=blk.start;
  document.getElementById('blockEnd').value=blk.end;
  document.getElementById('blockCategory').value=blk.category||'기타';
  document.getElementById('blockModal').classList.add('active');
}
function blockClose(){document.getElementById('blockModal').classList.remove('active');}
function blockSave(){
  const blocks=timeplanByDate[currentDate]||[];
  const blk=blocks.find(b=>b.id===editingBlockId);if(!blk)return;
  const t=document.getElementById('blockText').value.trim();
  const s=document.getElementById('blockStart').value;
  const e=document.getElementById('blockEnd').value;
  const c=document.getElementById('blockCategory').value;
  if(!t||!s||!e)return;
  const sm=Math.round(timeToMin(s)/SLOT_MIN)*SLOT_MIN;
  const em=Math.round(timeToMin(e)/SLOT_MIN)*SLOT_MIN;
  if(em<=sm)return;
  blk.text=t;blk.category=c;blk.start=minToTime(sm);blk.end=minToTime(em);
  saveTimeplan(currentDate);renderTimePlan();blockClose();
}
function blockDelete(){
  timeplanByDate[currentDate]=(timeplanByDate[currentDate]||[]).filter(b=>b.id!==editingBlockId);
  saveTimeplan(currentDate);renderTimePlan();blockClose();
}

// ── Master render ──
function renderAll(){renderAuth();renderBookmarks();renderShortcuts();renderDailyJob();renderBrainDump();renderTimePlan();}

// ── Init ──
(async()=>{
  // cache-first paint
  const cDJ=cacheGet('dailyJob');if(cDJ)dailyJob=cDJ;
  const cBD=cacheGet('brainDump');if(cBD)brainDump=cBD;
  const cTP=cacheGet('tp:'+currentDate);if(cTP)timeplanByDate[currentDate]=cTP;
  checkDailyJobReset();
  await Promise.all([fetchShortcuts(),fetchBookmarks()]);
  renderAll();
})();

// ── Periodic Daily Job reset check ──
setInterval(()=>{
  if(dailyJob.lastResetDate!==getPlannerDate()){
    checkDailyJobReset();renderDailyJob();renderTimePlan();
  }
},60000);
